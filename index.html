<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Video Editor Portfolio</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
color:white;
text-align:center;

}

.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background-image:url("hero-bg.jpg");
background-size:cover;
background-position:center;
position:relative;
}

.hero::after{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
}

.hero-content{
position:relative;
z-index:2;
max-width:800px;
}

.small{
letter-spacing:3px;
font-size:14px;
opacity:0.8;
}

h1{
font-size:60px;
margin:20px 0;
font-weight:700;
}

.subtitle{
font-size:18px;
opacity:0.8;
margin-bottom:30px;
}

.button{
border:1px solid white;
padding:12px 30px;
border-radius:30px;
text-decoration:none;
color:white;
display:inline-block;
transition:0.3s;
}

.button:hover{
background:white;
color:black;
}

.icons{
margin-top:30px;
font-size:20px;
opacity:0.8;
}

.email{
margin-top:20px;
background:white;
color:black;
padding:6px 14px;
border-radius:6px;
display:inline-block;
font-size:14px;
}

</style>
</head>

<body>

<section class="hero">

<div class="hero-content">

contact.lodduck@gmail.com
</div>

</html>
